<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIB</title>

<style>
:root {
  --panel: rgba(15,23,42,0.90);
  --panel2: rgba(2,6,23,0.95);
  --accent: #1d4ed8;
  --accent2: #3b82f6;
  --gold: #d4af37;
  --text: #e5e7eb;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Courier New", monospace;
  background:url("fib_background.png") no-repeat center center fixed;
  background-size:cover;
  color:var(--text);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(4px);
  z-index:-1;
}
header{
  background:rgba(0,0,0,0.85);
  padding:20px;
  border-bottom:2px solid var(--gold);
  display:flex;
  align-items:center;
}
header img{height:65px;margin-right:20px;}
header h1{color:var(--gold);margin:0;}
header span{margin-left:auto;color:#9ca3af;}

.container{
  display:grid;
  grid-template-columns:340px 1fr;
  height:calc(100vh - 100px);
}

.sidebar{
  background:var(--panel2);
  padding:20px;
  border-right:2px solid var(--gold);
  overflow-y:auto;
}

.main{
  padding:20px;
  overflow-y:auto;
}

.panel{
  background:var(--panel);
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
}

.panel h2{
  color:var(--gold);
  margin-top:0;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#111827;
  border:1px solid var(--accent2);
  color:white;
  border-radius:5px;
}

button{
  background:var(--accent);
  border:none;
  padding:10px;
  color:white;
  cursor:pointer;
  margin-bottom:5px;
  width:100%;
}

button:hover{
  background:var(--accent2);
}

.case{
  background:#111827;
  padding:10px;
  margin-bottom:5px;
  cursor:pointer;
}

.log{
  background:black;
  padding:10px;
  height:200px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
<img src="https://i.postimg.cc/rRzpSQyQ/tyui.png">
<h1>FIB</h1>
<span>Federal Investigation Bureau</span>
</header>

<div class="container">

<div class="sidebar">

<h2>Connexion</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="signup()">Créer un compte</button>
<button onclick="login()">Se connecter</button>

<div id="loginStatus"></div>

<h2>Dossiers</h2>

<button onclick="newCase()">+ Nouveau dossier</button>

<div id="caseList"></div>

</div>


<div class="main">

<div class="panel">
<h2>Informations</h2>

Numéro dossier
<input id="caseNumber">

Organisation
<input id="orgName">

Alias
<input id="alias">

Localisation
<input id="location">

Statut
<select id="status">
<option>ACTIF</option>
<option>SURVEILLANCE</option>
<option>FERMÉ</option>
</select>

Type
<select id="orgType">
<option>Criminelle</option>
<option>Gang</option>
<option>Entreprise écran</option>
</select>

Priorité
<select id="priority">
<option>Normale</option>
<option>Haute</option>
<option>Critique</option>
</select>

</div>


<div class="panel">
<h2>Description</h2>
<textarea id="description"></textarea>
</div>


<div class="panel">
<h2>Menace</h2>

<select id="threat">
<option>FAIBLE</option>
<option>MODÉRÉ</option>
<option>ÉLEVÉ</option>
<option>CRITIQUE</option>
</select>

</div>


<div class="panel">

<h2>Membres</h2>

<textarea id="members"></textarea>

</div>


<div class="panel">

<h2>Preuves</h2>

<textarea id="evidence"></textarea>

</div>


<div class="panel">

<button onclick="saveCase()">Sauvegarder</button>
<button onclick="deleteCase()">Supprimer</button>
<button onclick="exportCase()">Exporter</button>

</div>


<div class="panel">

<h2>Journal</h2>

<div class="log" id="log"></div>

</div>


</div>
</div>


<script>

let currentUser=null;
let currentCase=null;


function log(msg){

const logDiv=document.getElementById("log");

const time=new Date().toLocaleTimeString();

logDiv.innerHTML+="["+time+"] "+msg+"<br>";

}


function getUsers(){

return JSON.parse(localStorage.getItem("fib_users"))||{};

}


function saveUsers(users){

localStorage.setItem("fib_users",JSON.stringify(users));

}



function signup(){

const email=email.value;
const password=password.value;

if(!email||!password){

loginStatus.innerText="Remplis les champs";

return;

}

let users=getUsers();

if(users[email]){

loginStatus.innerText="Compte existe";

return;

}

users[email]={password:password,cases:{}};

saveUsers(users);

loginStatus.innerText="Compte créé";

log("Compte créé");

}



function login(){

const emailValue=email.value;
const passwordValue=password.value;

let users=getUsers();

if(!users[emailValue]||users[emailValue].password!==passwordValue){

loginStatus.innerText="Refusé";

return;

}

currentUser=emailValue;

loginStatus.innerText="Connecté";

log("Connexion");

loadCases();

}



function newCase(){

if(!currentUser){

alert("Connecte-toi");

return;

}

currentCase="case_"+Date.now();

clearForm();

log("Nouveau dossier");

}



function saveCase(){

if(!currentUser||!currentCase)return;

let users=getUsers();

users[currentUser].cases[currentCase]={

caseNumber:caseNumber.value,
orgName:orgName.value,
alias:alias.value,
location:location.value,
status:status.value,
orgType:orgType.value,
priority:priority.value,
description:description.value,
threat:threat.value,
members:members.value,
evidence:evidence.value

};

saveUsers(users);

loadCases();

log("Sauvegardé");

}



function loadCases(){

const list=document.getElementById("caseList");

list.innerHTML="";

let users=getUsers();

if(!users[currentUser])return;

for(let id in users[currentUser].cases){

const div=document.createElement("div");

div.className="case";

div.innerText=users[currentUser].cases[id].caseNumber||id;

div.onclick=()=>loadCase(id);

list.appendChild(div);

}

}



function loadCase(id){

currentCase=id;

let users=getUsers();

const c=users[currentUser].cases[id];

caseNumber.value=c.caseNumber;
orgName.value=c.orgName;
alias.value=c.alias;
location.value=c.location;
status.value=c.status;
orgType.value=c.orgType;
priority.value=c.priority;
description.value=c.description;
threat.value=c.threat;
members.value=c.members;
evidence.value=c.evidence;

log("Dossier chargé");

}



function deleteCase(){

if(!currentUser||!currentCase)return;

let users=getUsers();

delete users[currentUser].cases[currentCase];

saveUsers(users);

loadCases();

clearForm();

log("Supprimé");

}



function exportCase(){

if(!currentUser||!currentCase)return;

let users=getUsers();

const data=users[currentUser].cases[currentCase];

const blob=new Blob([JSON.stringify(data,null,2)]);

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="dossier.json";

a.click();

log("Exporté");

}



function clearForm(){

caseNumber.value="";
orgName.value="";
alias.value="";
location.value="";
description.value="";
members.value="";
evidence.value="";

}

</script>


</body>
</html>
</body>
</html>
