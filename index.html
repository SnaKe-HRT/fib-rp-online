<script>

let currentUser = null;
let currentCase = null;

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginStatus = document.getElementById("loginStatus");

function log(msg){
  const logDiv = document.getElementById("log");
  const time = new Date().toLocaleTimeString();
  logDiv.innerHTML += "[" + time + "] " + msg + "<br>";
  logDiv.scrollTop = logDiv.scrollHeight;
}

function getUsers(){
  return JSON.parse(localStorage.getItem("fib_users")) || {};
}

function saveUsers(users){
  localStorage.setItem("fib_users", JSON.stringify(users));
}


function signup(){

  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if(!email || !password){
    loginStatus.innerText = "Remplis les champs";
    return;
  }

  let users = getUsers();

  if(users[email]){
    loginStatus.innerText = "Compte existe déjà";
    return;
  }

  users[email] = {
    password: password,
    cases: {}
  };

  saveUsers(users);

  loginStatus.innerText = "Compte créé avec succès";
  log("Compte créé : " + email);
}


function login(){

  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  let users = getUsers();

  if(!users[email] || users[email].password !== password){
    loginStatus.innerText = "Email ou mot de passe incorrect";
    return;
  }

  currentUser = email;
  loginStatus.innerText = "Connecté : " + email;
  log("Connexion réussie");

  loadCases();
}


function logout(){

  currentUser = null;

  loginStatus.innerText = "Déconnecté";

  document.getElementById("caseList").innerHTML = "";

  clearForm();

  log("Déconnexion");
}


function newCase(){

  if(!currentUser){
    alert("Connecte-toi d'abord");
    return;
  }

  currentCase = "case_" + Date.now();

  clearForm();

  log("Nouveau dossier créé");
}


function saveCase(){

  if(!currentUser || !currentCase){
    alert("Créer ou charger un dossier");
    return;
  }

  let users = getUsers();

  users[currentUser].cases[currentCase] = {

    caseNumber: caseNumber.value,
    orgName: orgName.value,
    alias: alias.value,
    location: location.value,
    status: status.value,
    orgType: orgType.value,
    priority: priority.value,
    description: description.value,
    threat: threat.value,
    members: members.value,
    evidence: evidence.value

  };

  saveUsers(users);

  loadCases();

  log("Dossier sauvegardé");
}


function loadCases(){

  const list = document.getElementById("caseList");

  list.innerHTML = "";

  let users = getUsers();

  if(!users[currentUser]) return;

  for(let id in users[currentUser].cases){

    const div = document.createElement("div");

    div.className = "case";

    div.innerText = users[currentUser].cases[id].caseNumber || id;

    div.onclick = () => loadCase(id);

    list.appendChild(div);
  }
}


function loadCase(id){

  currentCase = id;

  let users = getUsers();

  const c = users[currentUser].cases[id];

  caseNumber.value = c.caseNumber || "";
  orgName.value = c.orgName || "";
  alias.value = c.alias || "";
  location.value = c.location || "";
  status.value = c.status || "ACTIF";
  orgType.value = c.orgType || "Criminelle";
  priority.value = c.priority || "Normale";
  description.value = c.description || "";
  threat.value = c.threat || "FAIBLE";
  members.value = c.members || "";
  evidence.value = c.evidence || "";

  log("Dossier chargé");
}


function deleteCase(){

  if(!currentUser || !currentCase) return;

  let users = getUsers();

  delete users[currentUser].cases[currentCase];

  saveUsers(users);

  loadCases();

  clearForm();

  log("Dossier supprimé");
}


function exportCase(){

  if(!currentUser || !currentCase) return;

  let users = getUsers();

  const data = users[currentUser].cases[currentCase];

  const blob = new Blob(
    [JSON.stringify(data,null,2)],
    {type:"application/json"}
  );

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download = "dossier.json";

  a.click();

  log("Dossier exporté");
}


function clearForm(){

  caseNumber.value = "";
  orgName.value = "";
  alias.value = "";
  location.value = "";
  status.value = "ACTIF";
  orgType.value = "Criminelle";
  priority.value = "Normale";
  description.value = "";
  threat.value = "FAIBLE";
  members.value = "";
  evidence.value = "";
}

</script>
